name: Video Merger

on:
  repository_dispatch:
    types: [start-merge]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Debug files
        run: |
          echo "Current directory:"
          pwd
          echo "Repository files:"
          ls -la
          echo "Workflow files:"
          ls -la .github/workflows || true
          echo "Jobs files:"
          ls -la jobs || true

      - name: Validate payload
        run: |
          JSON_PATH="${{ github.event.client_payload.json_path }}"
          echo "JSON path: $JSON_PATH"
          echo "Chat ID: ${{ github.event.client_payload.chat_id }}"
          echo "Upload Target: ${{ github.event.client_payload.upload_target }}"

          test -n "$JSON_PATH" || (echo "❌ json_path فارغ" && exit 1)
          test -f ".github/workflows/merge_script.py" || (echo "❌ merge_script.py غير موجود" && exit 1)

          FILE_FOUND=false
          for i in 1 2 3 4 5 6; do
            if [ -f "$JSON_PATH" ]; then
              echo "✅ الملف موجود في المحاولة $i"
              FILE_FOUND=true
              break
            fi
            echo "⏳ المحاولة $i: الملف غير موجود بعد، جاري التحديث..."
            git fetch origin main
            git reset --hard origin/main
            sleep 5
          done

          if [ "$FILE_FOUND" = false ]; then
            echo "❌ الملف غير موجود بعد 6 محاولات: $JSON_PATH"
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget unzip

          # Install Google Chrome
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add - 2>/dev/null || true
          echo "deb http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google.list >/dev/null
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable

          echo "Chrome version: $(google-chrome --version)"

      - name: Install ChromeDriver
        run: |
          CHROME_MAJOR=$(google-chrome --version | grep -oP '\d+' | head -1)
          echo "Chrome major version: $CHROME_MAJOR"

          # Use webdriver-manager as primary method
          pip install webdriver-manager

          # Also try to download matching ChromeDriver
          python3 -c "
import urllib.request
import json
import sys

try:
    url = 'https://googlechromelabs.github.io/chrome-for-testing/known-good-versions-with-downloads.json'
    with urllib.request.urlopen(url, timeout=10) as response:
        data = json.loads(response.read().decode())

    major = '$CHROME_MAJOR'
    for v in data.get('versions', []):
        if v['version'].startswith(major + '.'):
            for d in v.get('downloads', {}).get('chromedriver', []):
                if d['platform'] == 'linux64':
                    print('DRIVER_URL=' + d['url'])
                    sys.exit(0)
    print('No matching ChromeDriver found')
except Exception as e:
    print('Error: ' + str(e))
" > /tmp/chromedriver_url.txt

          DRIVER_URL=$(grep "DRIVER_URL=" /tmp/chromedriver_url.txt | cut -d= -f2 || true)

          if [ -n "$DRIVER_URL" ]; then
            echo "Found ChromeDriver URL: $DRIVER_URL"
            wget -q "$DRIVER_URL" -O chromedriver_linux64.zip
            unzip -q chromedriver_linux64.zip
            if [ -d "chromedriver-linux64" ]; then
              sudo mv chromedriver-linux64/chromedriver /usr/local/bin/
              rm -rf chromedriver-linux64
            else
              sudo mv chromedriver /usr/local/bin/ 2>/dev/null || true
            fi
            sudo chmod +x /usr/local/bin/chromedriver 2>/dev/null || true
            rm -f chromedriver_linux64.zip
            chromedriver --version || echo "ChromeDriver not directly available, using webdriver-manager"
          else
            echo "⚠️ Could not find ChromeDriver, will use webdriver-manager"
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          pip install requests google-auth google-auth-oauthlib google-api-python-client yt-dlp selenium webdriver-manager

      - name: Setup Rumble cookies
        if: github.event.client_payload.upload_target == 'rumble'
        env:
          RUMBLE_COOKIES_DATA: ${{ secrets.RUMBLE_COOKIES }}
        run: |
          printf '%s\n' "$RUMBLE_COOKIES_DATA" > /tmp/cookies.json
          echo "✅ Rumble cookies saved"

      - name: Run merge script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ github.event.client_payload.chat_id }}
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          UPLOAD_TARGET: ${{ github.event.client_payload.upload_target }}
          RUMBLE_EMAIL: ${{ secrets.RUMBLE_EMAIL }}
          RUMBLE_PASSWORD: ${{ secrets.RUMBLE_PASSWORD }}
          PYTHONUNBUFFERED: "1"
        run: |
          python .github/workflows/merge_script.py "${{ github.event.client_payload.json_path }}"
