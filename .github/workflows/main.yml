name: Video Merger

on:
  repository_dispatch:
    types: [start-merge]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate payload
        run: |
          JSON_PATH="${{ github.event.client_payload.json_path }}"
          test -n "$JSON_PATH" || (echo "❌ json_path فارغ" && exit 1)
          
          FILE_FOUND=false
          for i in 1 2 3 4 5 6; do
            if [ -f "$JSON_PATH" ]; then FILE_FOUND=true; break; fi
            git fetch origin main && git reset --hard origin/main && sleep 5
          done
          [ "$FILE_FOUND" = true ] || (echo "❌ الملف غير موجود" && exit 1)

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          pip install requests google-auth google-auth-oauthlib google-api-python-client yt-dlp chardet firebase-admin

      - name: Run merge script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ github.event.client_payload.chat_id }}
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          UPLOAD_TARGET: ${{ github.event.client_payload.upload_target }}
          VIDARA_API_KEY: ${{ secrets.VIDARA_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          PYTHONUNBUFFERED: "1"
        run: |
          python .github/workflows/merge_script.py "${{ github.event.client_payload.json_path }}"
