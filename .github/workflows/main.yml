name: Video Merger

on:
  repository_dispatch:
    types: [start-merge]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Debug files
        run: |
          echo "Current directory:"
          pwd
          echo "Repository files:"
          ls -la
          echo "Workflow files:"
          ls -la .github/workflows || true
          echo "Jobs files:"
          ls -la jobs || true

      - name: Validate payload
        run: |
          JSON_PATH="${{ github.event.client_payload.json_path }}"
          echo "JSON path: $JSON_PATH"
          echo "Chat ID: ${{ github.event.client_payload.chat_id }}"

          test -n "$JSON_PATH" || (echo "❌ json_path فارغ" && exit 1)
          test -f "merge_script.py" || (echo "❌ merge_script.py غير موجود" && exit 1)

          FILE_FOUND=false
          for i in 1 2 3 4 5 6; do
            if [ -f "$JSON_PATH" ]; then
              echo "✅ الملف موجود في المحاولة $i"
              FILE_FOUND=true
              break
            fi
            echo "⏳ المحاولة $i: الملف غير موجود بعد، جاري التحديث..."
            git fetch origin main
            git reset --hard origin/main
            sleep 5
          done

          if [ "$FILE_FOUND" = false ]; then
            echo "❌ الملف غير موجود بعد 6 محاولات: $JSON_PATH"
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          pip install requests google-auth google-api-python-client

      - name: Run merge script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ github.event.client_payload.chat_id }}
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          JSON_PATH: ${{ github.event.client_payload.json_path }}
        run: |
          python ./merge_script.py "$JSON_PATH"
