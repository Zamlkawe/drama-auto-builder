name: Video Merger

on:
  repository_dispatch:
    types: [start-merge]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate payload
        run: |
          echo "JSON path: ${{ github.event.client_payload.json_path }}"
          echo "Chat ID: ${{ github.event.client_payload.chat_id }}"
          test -n "${{ github.event.client_payload.json_path }}"
          test -f "${{ github.event.client_payload.json_path }}"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          pip install requests google-auth google-api-python-client

      - name: Run merge script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ github.event.client_payload.chat_id }}
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          JSON_PATH: ${{ github.event.client_payload.json_path }}
        run: |
          python merge_script.py "$JSON_PATH"
