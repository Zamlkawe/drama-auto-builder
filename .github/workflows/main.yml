name: Video Merger

on:
  repository_dispatch:
    types: [start-merge]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Debug files
        run: |
          echo "Current directory:"
          pwd
          echo "Repository files:"
          ls -la
          echo "Workflow files:"
          ls -la .github/workflows || true
          echo "Jobs files:"
          ls -la jobs || true

      - name: Validate payload
        run: |
          JSON_PATH="${{ github.event.client_payload.json_path }}"
          echo "JSON path: $JSON_PATH"
          echo "Chat ID: ${{ github.event.client_payload.chat_id }}"
          echo "Upload Target: ${{ github.event.client_payload.upload_target }}"

          test -n "$JSON_PATH" || (echo "❌ json_path فارغ" && exit 1)
          test -f ".github/workflows/merge_script.py" || (echo "❌ merge_script.py غير موجود" && exit 1)

          FILE_FOUND=false
          for i in 1 2 3 4 5 6; do
            if [ -f "$JSON_PATH" ]; then
              echo "✅ الملف موجود في المحاولة $i"
              FILE_FOUND=true
              break
            fi
            echo "⏳ المحاولة $i: الملف غير موجود بعد، جاري التحديث..."
            git fetch origin main
            git reset --hard origin/main
            sleep 5
          done

          if [ "$FILE_FOUND" = false ]; then
            echo "❌ الملف غير موجود بعد 6 محاولات: $JSON_PATH"
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome & ChromeDriver (Chrome for Testing)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget unzip

          # Install Google Chrome (latest stable)
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add - 2>/dev/null || true
          echo "deb http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google.list >/dev/null
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable

          # Get Chrome version
          CHROME_FULL=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+\.\d+')
          CHROME_MAJOR=$(echo "$CHROME_FULL" | cut -d. -f1)
          echo "Chrome installed: $CHROME_FULL (major: $CHROME_MAJOR)"

          # Download ChromeDriver from Chrome for Testing API
          echo "Downloading ChromeDriver for Chrome $CHROME_MAJOR..."

          # Try the new Chrome for Testing API first
          CF_JSON=$(curl -s "https://googlechromelabs.github.io/chrome-for-testing/known-good-versions-with-downloads.json")

          if [ -n "$CF_JSON" ]; then
            # Find matching ChromeDriver URL
            DRIVER_URL=$(echo "$CF_JSON" | python3 -c "
import sys, json
data = json.load(sys.stdin)
chrome_ver = '$CHROME_FULL'
major = '$CHROME_MAJOR'
for v in data.get('versions', []):
    if v['version'].startswith(major + '.'):
        for d in v.get('downloads', {}).get('chromedriver', []):
            if d['platform'] == 'linux64':
                print(d['url'])
                sys.exit(0)
" 2>/dev/null)
          fi

          if [ -z "$DRIVER_URL" ]; then
            # Fallback: use webdriver-manager
            echo "Using webdriver-manager fallback..."
            pip install webdriver-manager
            python3 -c "
from webdriver_manager.chrome import ChromeDriverManager
from selenium import webdriver
from selenium.webdriver.chrome.options import Options
opts = Options()
opts.add_argument('--headless=new')
opts.add_argument('--no-sandbox')
driver = webdriver.Chrome(options=opts)
print('ChromeDriver path:', driver.service.path)
driver.quit()
" 2>/dev/null || true
          else
            echo "Found ChromeDriver URL: $DRIVER_URL"
            wget -q "$DRIVER_URL" -O chromedriver_linux64.zip
            unzip -q chromedriver_linux64.zip
            # The zip might have nested directory
            if [ -f "chromedriver-linux64/chromedriver" ]; then
              sudo mv chromedriver-linux64/chromedriver /usr/local/bin/
            else
              sudo mv chromedriver /usr/local/bin/
            fi
            sudo chmod +x /usr/local/bin/chromedriver
            rm -rf chromedriver_linux64.zip chromedriver-linux64 chromedriver 2>/dev/null || true
          fi

          # Verify
          which chromedriver && chromedriver --version || echo "ChromeDriver not in PATH, will use webdriver-manager"
          echo "Chrome version: $(google-chrome --version)"

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          pip install requests google-auth google-auth-oauthlib google-api-python-client yt-dlp selenium webdriver-manager

      - name: Setup Rumble cookies
        if: github.event.client_payload.upload_target == 'rumble'
        run: |
          echo '${{ secrets.RUMBLE_COOKIES }}' > /tmp/cookies.json
          echo "✅ Rumble cookies saved"

      - name: Run merge script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ github.event.client_payload.chat_id }}
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          UPLOAD_TARGET: ${{ github.event.client_payload.upload_target }}
          RUMBLE_EMAIL: ${{ secrets.RUMBLE_EMAIL }}
          RUMBLE_PASSWORD: ${{ secrets.RUMBLE_PASSWORD }}
          PYTHONUNBUFFERED: "1"
        run: |
          python .github/workflows/merge_script.py "${{ github.event.client_payload.json_path }}"
